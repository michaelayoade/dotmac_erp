name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  DATABASE_URL: "sqlite:///./test.db"
  SECRET_KEY: "ci-test-secret-key-not-for-production"  # pragma: allowlist secret
  REDIS_URL: "redis://localhost:6379/0"

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ env.PYTHON_VERSION }}-${{ hashFiles('poetry.lock') }}

      - name: Install dependencies
        run: poetry install --only dev --no-interaction

      - name: Ruff check
        run: poetry run ruff check app/

      - name: Ruff format check
        run: poetry run ruff format --check app/

  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ env.PYTHON_VERSION }}-${{ hashFiles('poetry.lock') }}

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Run mypy
        run: poetry run mypy app/ --no-incremental

  test:
    name: Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ env.PYTHON_VERSION }}-${{ hashFiles('poetry.lock') }}

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Run tests with coverage
        run: poetry run pytest tests/ --ignore=tests/integration --ignore=tests/e2e --cov=app --cov-report=xml --cov-report=term-missing -q --timeout=60

      - name: Upload coverage
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ env.PYTHON_VERSION }}-${{ hashFiles('poetry.lock') }}

      - name: Install dependencies
        run: poetry install --only dev --no-interaction

      - name: Security lint (bandit via ruff)
        run: poetry run ruff check app/ --select S --ignore S110

  pre-commit:
    name: Pre-commit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: pre-commit/action@v3.0.1
        env:
          SKIP: semgrep  # semgrep needs poetry; covered by Security Scan job

  # ---------------------------------------------------------------------------
  # Docker Build & Health Check
  # Builds the multi-stage image (Node CSS + Python) and verifies the container
  # starts successfully and responds to health checks.
  # ---------------------------------------------------------------------------
  docker-build:
    name: Docker Build & Health Check
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: dotmac-erp:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create CI network
        run: docker network create ci-net

      - name: Start PostgreSQL  # pragma: allowlist secret
        run: |
          docker run -d --name ci-db --network ci-net \
            -e POSTGRES_USER=postgres \
            -e POSTGRES_PASSWORD=postgres \
            -e POSTGRES_DB=dotmac_erp_ci \
            --health-cmd "pg_isready -U postgres" \
            --health-interval 5s \
            --health-retries 10 \
            postgres:16

      - name: Start Redis
        run: docker run -d --name ci-redis --network ci-net redis:7

      - name: Wait for PostgreSQL
        run: |
          for i in $(seq 1 30); do
            if docker exec ci-db pg_isready -U postgres > /dev/null 2>&1; then
              echo "PostgreSQL ready"
              break
            fi
            echo "Waiting for PostgreSQL... ($i/30)"
            sleep 2
          done

      - name: Run database migrations
        run: |  # pragma: allowlist secret
          docker run --rm --name ci-migrate --network ci-net \
            -e DATABASE_URL=postgresql+psycopg://postgres:postgres@ci-db:5432/dotmac_erp_ci \
            -e SECRET_KEY=ci-test-secret-key-not-for-production \
            -e JWT_SECRET=ci-test-jwt-secret-key-minimum-32-bytes-long \
            -e TOTP_ENCRYPTION_KEY=QLUJktsTSfZEbST4R-37XmQ0tCkiVCBXZN2Zt053w8g= \
            -e REDIS_URL=redis://ci-redis:6379/0 \
            dotmac-erp:ci \
            alembic upgrade head

      - name: Start application  # pragma: allowlist secret
        run: |
          docker run -d --name ci-app --network ci-net \
            -e DATABASE_URL=postgresql+psycopg://postgres:postgres@ci-db:5432/dotmac_erp_ci \
            -e SECRET_KEY=ci-test-secret-key-not-for-production \
            -e JWT_SECRET=ci-test-jwt-secret-key-minimum-32-bytes-long \
            -e TOTP_ENCRYPTION_KEY=QLUJktsTSfZEbST4R-37XmQ0tCkiVCBXZN2Zt053w8g= \
            -e REDIS_URL=redis://ci-redis:6379/0 \
            -e CELERY_BROKER_URL=redis://ci-redis:6379/0 \
            -e GUNICORN_WORKERS=2 \
            dotmac-erp:ci \
            gunicorn -c gunicorn.conf.py app.main:app

      - name: Wait for health check
        run: |
          for i in $(seq 1 60); do
            STATUS=$(docker inspect --format='{{.State.Status}}' ci-app 2>/dev/null || echo "missing")
            if [ "$STATUS" = "exited" ]; then
              echo "Container exited unexpectedly!"
              docker logs ci-app
              exit 1
            fi
            HEALTH=$(docker exec ci-app python -c "import urllib.request; print(urllib.request.urlopen('http://localhost:8002/health').read().decode())" 2>/dev/null || echo "")
            if echo "$HEALTH" | grep -q '"ok"'; then
              echo "Health check passed: $HEALTH"
              exit 0
            fi
            echo "Waiting for app to be healthy... ($i/60)"
            sleep 3
          done
          echo "Health check timed out after 180 seconds"
          docker logs ci-app
          exit 1

      - name: Cleanup
        if: always()
        run: |
          docker rm -f ci-app ci-db ci-redis 2>/dev/null || true
          docker network rm ci-net 2>/dev/null || true

  # ---------------------------------------------------------------------------
  # Integration Tests — PostgreSQL
  # Runs tests/integration/ against a real PostgreSQL 16 service container.
  # Validates Alembic migrations and PostgreSQL-specific features.
  # Non-blocking: failures here don't prevent image publish.
  # ---------------------------------------------------------------------------
  integration-test:
    name: Integration Tests (PostgreSQL)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    continue-on-error: true
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres  # pragma: allowlist secret
          POSTGRES_DB: dotmac_erp_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: "postgresql+psycopg://postgres:postgres@localhost:5432/dotmac_erp_test"
      TEST_DATABASE_URL: "postgresql+psycopg://postgres:postgres@localhost:5432/dotmac_erp_test"
      JWT_SECRET: "ci-integration-test-secret-key-minimum-32-bytes"  # pragma: allowlist secret
      TOTP_ENCRYPTION_KEY: "QLUJktsTSfZEbST4R-37XmQ0tCkiVCBXZN2Zt053w8g="  # pragma: allowlist secret
      REDIS_URL: "redis://localhost:6379/0"
    steps:
      - uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ env.PYTHON_VERSION }}-${{ hashFiles('poetry.lock') }}

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Run Alembic migrations
        run: poetry run alembic upgrade head

      - name: Run integration tests
        # -o addopts= clears pytest.ini's "-m not integration" filter
        # confcutdir prevents loading tests/conftest.py which monkey-patches
        # PostgreSQL UUID/JSONB types for SQLite compatibility
        # --timeout=120 prevents individual tests from hanging forever
        run: poetry run pytest tests/integration/ -v --tb=short --timeout=120 -o "addopts=" -o "confcutdir=tests/integration"

  # ---------------------------------------------------------------------------
  # Hardened Docker Build (Nuitka-compiled, no source)
  # Builds the on-premise image with compiled .so files.
  # ---------------------------------------------------------------------------
  build-hardened:
    name: Build Hardened Image
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [lint, type-check, test, docker-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build hardened image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.hardened
          load: true
          tags: dotmac-erp-hardened:ci
          cache-from: type=gha,scope=hardened
          cache-to: type=gha,mode=max,scope=hardened

      - name: Health check (hardened image)  # pragma: allowlist secret
        run: |
          docker network create ci-hardened-net
          docker run -d --name ci-hard-db --network ci-hardened-net \
            -e POSTGRES_USER=postgres \
            -e POSTGRES_PASSWORD=postgres \
            -e POSTGRES_DB=dotmac_erp_ci \
            --health-cmd "pg_isready -U postgres" \
            --health-interval 5s \
            --health-retries 10 \
            postgres:16
          docker run -d --name ci-hard-redis --network ci-hardened-net redis:7

          # Wait for PostgreSQL
          for i in $(seq 1 30); do
            if docker exec ci-hard-db pg_isready -U postgres > /dev/null 2>&1; then
              echo "PostgreSQL ready"; break
            fi
            echo "Waiting... ($i/30)"; sleep 2
          done

          # Run migrations
          docker run --rm --name ci-hard-migrate --network ci-hardened-net \
            -e DATABASE_URL=postgresql+psycopg://postgres:postgres@ci-hard-db:5432/dotmac_erp_ci \
            -e JWT_SECRET=ci-test-jwt-secret-key-minimum-32-bytes-long \
            -e TOTP_ENCRYPTION_KEY=QLUJktsTSfZEbST4R-37XmQ0tCkiVCBXZN2Zt053w8g= \
            -e REDIS_URL=redis://ci-hard-redis:6379/0 \
            -e DOTMAC_DEV_MODE=true \
            dotmac-erp-hardened:ci \
            alembic upgrade head

          # Start app in dev mode (no license file needed for CI)
          docker run -d --name ci-hard-app --network ci-hardened-net \
            -e DATABASE_URL=postgresql+psycopg://postgres:postgres@ci-hard-db:5432/dotmac_erp_ci \
            -e JWT_SECRET=ci-test-jwt-secret-key-minimum-32-bytes-long \
            -e TOTP_ENCRYPTION_KEY=QLUJktsTSfZEbST4R-37XmQ0tCkiVCBXZN2Zt053w8g= \
            -e REDIS_URL=redis://ci-hard-redis:6379/0 \
            -e CELERY_BROKER_URL=redis://ci-hard-redis:6379/0 \
            -e DOTMAC_DEV_MODE=true \
            dotmac-erp-hardened:ci \
            uvicorn app.main:app --host 0.0.0.0 --port 8001

          # Wait for health
          for i in $(seq 1 60); do
            HEALTH=$(docker exec ci-hard-app python -c "import urllib.request; print(urllib.request.urlopen('http://localhost:8001/health').read().decode())" 2>/dev/null || echo "")
            if echo "$HEALTH" | grep -q '"ok"'; then
              echo "Hardened health check passed: $HEALTH"; exit 0
            fi
            echo "Waiting... ($i/60)"; sleep 3
          done
          echo "Health check timed out"; docker logs ci-hard-app; exit 1

      - name: Push hardened image
        if: success()
        run: |
          DATE_TAG=$(date +%Y.%m.%d)
          SHA_TAG=sha-$(echo "${{ github.sha }}" | cut -c1-7)
          docker tag dotmac-erp-hardened:ci ghcr.io/${{ github.repository }}_hardened:latest
          docker tag dotmac-erp-hardened:ci ghcr.io/${{ github.repository }}_hardened:$SHA_TAG
          docker tag dotmac-erp-hardened:ci ghcr.io/${{ github.repository }}_hardened:$DATE_TAG
          docker push ghcr.io/${{ github.repository }}_hardened:latest
          docker push ghcr.io/${{ github.repository }}_hardened:$SHA_TAG
          docker push ghcr.io/${{ github.repository }}_hardened:$DATE_TAG

      - name: Cleanup
        if: always()
        run: |
          docker rm -f ci-hard-app ci-hard-db ci-hard-redis 2>/dev/null || true
          docker network rm ci-hardened-net 2>/dev/null || true

  # ---------------------------------------------------------------------------
  # Publish Docker Image to GHCR
  # Only runs on main branch after all checks pass.
  # Tags: latest, sha-<short>, date (YYYY-MM-DD)
  # ---------------------------------------------------------------------------
  publish-image:
    name: Publish Docker Image
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [lint, type-check, test, docker-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=short
            type=raw,value={{date 'YYYY-MM-DD'}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
