services:
  app:
    build: .
    container_name: dotmac_books_app
    restart: unless-stopped
    ports:
      - "8001:8001"
    env_file:
      - .env
    environment:
      # Override database URL for Docker networking (must come after env_file)
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/dotmac_books
      REDIS_URL: redis://:redis@redis:6379/0
      CELERY_BROKER_URL: redis://:redis@redis:6379/0
      CELERY_RESULT_BACKEND: redis://:redis@redis:6379/1
    depends_on:
      - db
      - redis
    volumes:
      - ./app:/app/app
      - ./templates:/app/templates
      - ./static:/app/static
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8001", "--reload"]

  worker:
    build: .
    container_name: dotmac_books_worker
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/dotmac_books
      REDIS_URL: redis://:redis@redis:6379/0
      CELERY_BROKER_URL: redis://:redis@redis:6379/0
      CELERY_RESULT_BACKEND: redis://:redis@redis:6379/1
    depends_on:
      - db
      - redis
    command: ["celery", "-A", "app.celery_app", "worker", "-l", "info"]

  beat:
    build: .
    container_name: dotmac_books_beat
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/dotmac_books
      REDIS_URL: redis://:redis@redis:6379/0
      CELERY_BROKER_URL: redis://:redis@redis:6379/0
      CELERY_RESULT_BACKEND: redis://:redis@redis:6379/1
    depends_on:
      - db
      - redis
    command: ["celery", "-A", "app.celery_app", "beat", "-l", "info"]

  db:
    image: postgres:16
    container_name: dotmac_books_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-dotmac_books}
    ports:
      - "5434:5432"
    volumes:
      - dotmac_books_db_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: dotmac_books_redis
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:-redis}"]
    ports:
      - "6379:6379"

volumes:
  dotmac_books_db_data:
