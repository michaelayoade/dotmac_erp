services:
  openbao:
    image: openbao/openbao:2
    container_name: dotmac_erp_openbao
    restart: unless-stopped
    cap_add:
      - IPC_LOCK
    environment:
      BAO_DEV_ROOT_TOKEN_ID: ${OPENBAO_TOKEN:-devtoken}
      BAO_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    ports:
      - "8200:8200"
    volumes:
      - openbao_data:/openbao/data
    command: server -dev
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:8200/v1/sys/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  app:
    build: .
    container_name: dotmac_erp_app
    restart: unless-stopped
    ports:
      - "8003:8002"
    env_file:
      - .env
    environment:
      APP_URL: "https://erp.dotmac.io"
      # Single-org mode: use this default organization for all users
      DEFAULT_ORGANIZATION_ID: "00000000-0000-0000-0000-000000000001"
      # Override for Docker networking (must come after env_file)
      DATABASE_URL: postgresql+psycopg://postgres:${POSTGRES_PASSWORD}@db:5432/dotmac_erp
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD}@redis:6379/1
      CSP_ALLOW_UNSAFE: "true"
      # OpenBao configuration
      OPENBAO_ADDR: http://openbao:8200
      OPENBAO_TOKEN: ${OPENBAO_TOKEN:-devtoken}
      OPENBAO_ALLOW_INSECURE: "true"
      GUNICORN_WORKERS: "4"
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONPYCACHEPREFIX: "/tmp/pycache"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      openbao:
        condition: service_healthy
    volumes:
      - dotmac_logs:/var/log/dotmac
      - ./uploads:/app/uploads
      - ./static:/app/static:ro
      - ./templates:/app/templates:ro
      - ./app:/app/app:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    command: ["gunicorn", "-c", "gunicorn.conf.py", "app.main:app"]

  app-dev:
    build: .
    container_name: dotmac_erp_app_dev
    restart: unless-stopped
    profiles: ["dev"]
    ports:
      - "8002:8002"
    env_file:
      - .env
    environment:
      APP_URL: "https://erp.dotmac.io"
      DATABASE_URL: postgresql+psycopg://postgres:${POSTGRES_PASSWORD}@db:5432/dotmac_erp
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD}@redis:6379/1
      OPENBAO_ADDR: http://openbao:8200
      OPENBAO_TOKEN: ${OPENBAO_TOKEN:-devtoken}
      OPENBAO_ALLOW_INSECURE: "true"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      openbao:
        condition: service_healthy
    volumes:
      - .:/app
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8002"]

  worker:
    build: .
    container_name: dotmac_erp_worker
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:${POSTGRES_PASSWORD}@db:5432/dotmac_erp
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD}@redis:6379/1
      OPENBAO_ADDR: http://openbao:8200
      OPENBAO_TOKEN: ${OPENBAO_TOKEN:-devtoken}
      OPENBAO_ALLOW_INSECURE: "true"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      openbao:
        condition: service_healthy
    volumes:
      - ./app:/app/app:ro
    command: ["celery", "-A", "app.celery_app", "worker", "-l", "info"]

  beat:
    build: .
    container_name: dotmac_erp_beat
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:${POSTGRES_PASSWORD}@db:5432/dotmac_erp
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD}@redis:6379/1
      OPENBAO_ADDR: http://openbao:8200
      OPENBAO_TOKEN: ${OPENBAO_TOKEN:-devtoken}
      OPENBAO_ALLOW_INSECURE: "true"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      openbao:
        condition: service_healthy
    command: ["celery", "-A", "app.celery_app", "beat", "-l", "info"]

  db:
    image: postgres:16
    container_name: dotmac_erp_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-dotmac_erp}
    ports:
      - "5437:5432"
    volumes:
      - dotmac_erp_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-dotmac_erp}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: dotmac_erp_redis
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:-redis}"]
    ports:
      - "6382:6379"

volumes:
  dotmac_erp_db_data:
  openbao_data:
  dotmac_logs:
