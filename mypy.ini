[mypy]
python_version = 3.12
warn_return_any = true
warn_unused_ignores = true
show_error_codes = true
pretty = true
warn_unused_configs = true
warn_redundant_casts = true
incremental = false

# Be lenient about missing imports for third-party libraries
ignore_missing_imports = true

# Allow implicit Optional (common pattern in FastAPI/SQLAlchemy)
implicit_optional = true

# Don't require all functions to have type annotations
disallow_untyped_defs = false
disallow_incomplete_defs = false

# SQLAlchemy plugin for better ORM support
plugins = sqlalchemy.ext.mypy.plugin

# Exclude test files, migrations, WIP modules, and one-off scripts
exclude = (?x)(
    ^tests/
    | ^alembic/
    | ^scripts/
    | ^app/starter/
    | ^app/tools/
  )

# ============================================================================
# Per-module configuration
# ============================================================================

# SQLAlchemy models - be lenient with ORM attribute types
[mypy-app.models.*]
# SQLAlchemy Mapped[] types cause many false positives
disable_error_code = assignment, arg-type, return-value

# Finance AP web — auth.organization_id/user_id typed UUID|None vs UUID
[mypy-app.services.finance.ap.web.*]
disable_error_code = arg-type, union-attr, assignment

# Finance banking web — apply_sort return type, RedirectResponse vs HTMLResponse
[mypy-app.services.finance.banking.web]
disable_error_code = assignment, union-attr, return-value

[mypy-app.services.finance.banking.auto_reconciliation]
disable_error_code = union-attr

# Finance AR/GL — apply_sort return type narrowing
[mypy-app.services.finance.ar.*]
disable_error_code = assignment

[mypy-app.services.finance.gl.*]
disable_error_code = assignment

# Splynx sync — dict.get() returns T|None, variable redefinition
[mypy-app.services.splynx.sync]
disable_error_code = assignment, no-redef

# Coach — redundant casts
[mypy-app.services.coach.*]
disable_error_code = redundant-cast, arg-type

# Expense web — StreamingResponse vs FileResponse
[mypy-app.services.expense.web]
disable_error_code = return-value

# ERPNext sync — return type
[mypy-app.services.erpnext.sync.*]
disable_error_code = assignment, no-any-return, attr-defined

# People perf — missing annotation
[mypy-app.services.people.perf.web.*]
disable_error_code = var-annotated

# Admin web
[mypy-app.services.admin.web]
disable_error_code = arg-type

# Web layer
[mypy-app.web.*]
disable_error_code = arg-type, var-annotated, attr-defined, call-arg
