[mypy]
python_version = 3.12
warn_return_any = true
warn_unused_ignores = true
show_error_codes = true
pretty = true
warn_unused_configs = true
warn_redundant_casts = true

# Be lenient about missing imports for third-party libraries
ignore_missing_imports = true

# Allow implicit Optional (common pattern in FastAPI/SQLAlchemy)
implicit_optional = true

# Don't require all functions to have type annotations
disallow_untyped_defs = false
disallow_incomplete_defs = false

# SQLAlchemy plugin for better ORM support
plugins = sqlalchemy.ext.mypy.plugin

# Exclude test files and migrations from strict checking
exclude = (?x)(
    ^tests/
    | ^alembic/
    | ^scripts/
  )

# ============================================================================
# Per-module configuration
# ============================================================================

# SQLAlchemy models - be lenient with ORM attribute types
[mypy-app.models.*]
# SQLAlchemy Mapped[] types cause many false positives
disable_error_code = assignment, arg-type, return-value

[mypy-app.models.ifrs.*]
disable_error_code = assignment, arg-type, return-value

# Service layer - allow some flexibility for SQLAlchemy queries
[mypy-app.services.ifrs.*]
# Many false positives from SQLAlchemy query results
disable_error_code = assignment, union-attr, arg-type

[mypy-app.services.ifrs.banking.*]
disable_error_code = assignment, union-attr, arg-type, attr-defined, return-value

[mypy-app.services.ifrs.ar.*]
disable_error_code = assignment, union-attr, arg-type, attr-defined, operator, misc, return-value

[mypy-app.services.ifrs.tax.*]
disable_error_code = assignment, union-attr, arg-type, valid-type, attr-defined

[mypy-app.services.ifrs.fin_inst.*]
disable_error_code = assignment, union-attr, arg-type, valid-type, attr-defined

[mypy-app.services.ifrs.cons.*]
disable_error_code = assignment, arg-type, call-arg, attr-defined

[mypy-app.services.ifrs.gl.*]
disable_error_code = assignment, arg-type, var-annotated, return-value, operator

[mypy-app.services.ifrs.inv.*]
disable_error_code = assignment, union-attr, valid-type, attr-defined

[mypy-app.services.ifrs.lease.*]
disable_error_code = attr-defined, return-value, call-arg

[mypy-app.services.ifrs.platform.*]
disable_error_code = assignment, return-value, valid-type

[mypy-app.services.ifrs.ap.*]
disable_error_code = assignment, union-attr, attr-defined

[mypy-app.services.ifrs.fa.*]
disable_error_code = attr-defined, assignment

[mypy-app.services.ifrs.rpt.*]
disable_error_code = union-attr, arg-type

# API layer - be lenient with schema mismatches during development
[mypy-app.api.ifrs.*]
disable_error_code = attr-defined, call-arg, arg-type

# Web layer
[mypy-app.web.*]
disable_error_code = arg-type, var-annotated, attr-defined, call-arg
