[pytest]
testpaths = tests
addopts = -q -m "not integration"
pythonpath = .
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
markers =
    asyncio: mark a test as asyncio
    e2e: mark test as end-to-end browser test (requires running server)
    integration: mark test as integration (requires PostgreSQL)
filterwarnings =
    ignore:Please use `import python_multipart` instead.:PendingDeprecationWarning
    ignore:'crypt' is deprecated and slated for removal in Python 3.13:DeprecationWarning
    ignore:datetime.datetime.utcnow\(\) is deprecated.*:DeprecationWarning
    ignore:Unclosed.*MemoryObjectReceiveStream.*:ResourceWarning
    ignore:Unclosed.*MemoryObjectSendStream.*:ResourceWarning
    ignore:unclosed transport.*:ResourceWarning
