<!DOCTYPE html>
<html lang="en" x-data="checklist()" :class="{ 'dark': darkMode }">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DotMac ERP — Go-Live Readiness</title>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,400&family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;0,8..60,600;0,8..60,700;1,8..60,400&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #f8f6f1;
  --bg-card: #ffffff;
  --bg-section: #faf9f6;
  --bg-hover: #f3f1ec;
  --bg-checked: #f0fdf4;
  --border: #e5e1d8;
  --border-light: #ece9e1;
  --text: #1a1814;
  --text-secondary: #6b6560;
  --text-muted: #9c9690;
  --accent: #b45309;
  --accent-light: #fef3c7;
  --green: #16a34a;
  --green-bg: #dcfce7;
  --yellow: #ca8a04;
  --yellow-bg: #fef9c3;
  --red: #dc2626;
  --red-bg: #fee2e2;
  --teal: #0d9488;
  --violet: #7c3aed;
  --header-from: #1c1917;
  --header-to: #292524;
  --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  --shadow-lg: 0 4px 12px rgba(0,0,0,0.08);
  --radius: 10px;
  --mono: 'DM Mono', 'Courier New', monospace;
  --serif: 'Source Serif 4', Georgia, serif;
  --sans: 'Inter', -apple-system, sans-serif;
}

.dark {
  --bg: #0c0a09;
  --bg-card: #1c1917;
  --bg-section: #171412;
  --bg-hover: #292524;
  --bg-checked: #052e16;
  --border: #292524;
  --border-light: #1c1917;
  --text: #fafaf9;
  --text-secondary: #a8a29e;
  --text-muted: #78716c;
  --accent: #f59e0b;
  --accent-light: #451a03;
  --green-bg: #052e16;
  --yellow-bg: #422006;
  --red-bg: #450a0a;
  --header-from: #000000;
  --header-to: #0c0a09;
  --shadow: 0 1px 3px rgba(0,0,0,0.3);
  --shadow-lg: 0 4px 12px rgba(0,0,0,0.4);
}

html { scroll-behavior: smooth; }

body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
}

/* ─── HEADER ─── */
.site-header {
  background: linear-gradient(135deg, var(--header-from), var(--header-to));
  color: #fafaf9;
  padding: 2.5rem 2rem 2rem;
  position: relative;
  overflow: hidden;
}

.site-header::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background:
    radial-gradient(ellipse at 20% 50%, rgba(180,83,9,0.15) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 20%, rgba(13,148,136,0.1) 0%, transparent 50%);
  pointer-events: none;
}

.site-header::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(245,158,11,0.4), transparent);
}

.header-inner {
  max-width: 1200px;
  margin: 0 auto;
  position: relative;
  z-index: 1;
}

.header-top {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 1rem;
  margin-bottom: 1.5rem;
}

.brand {
  display: flex;
  align-items: center;
  gap: 1rem;
}

.brand-icon {
  width: 44px; height: 44px;
  background: linear-gradient(135deg, #b45309, #d97706);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--mono);
  font-weight: 500;
  font-size: 1.1rem;
  color: white;
  box-shadow: 0 2px 8px rgba(180,83,9,0.3);
}

.brand h1 {
  font-family: var(--serif);
  font-size: 1.5rem;
  font-weight: 700;
  letter-spacing: -0.02em;
  line-height: 1.2;
}

.brand p {
  font-family: var(--mono);
  font-size: 0.7rem;
  text-transform: uppercase;
  letter-spacing: 0.15em;
  color: #a8a29e;
  margin-top: 2px;
}

.header-actions {
  display: flex;
  gap: 0.5rem;
  flex-shrink: 0;
}

.header-btn {
  font-family: var(--mono);
  font-size: 0.7rem;
  padding: 0.4rem 0.75rem;
  border-radius: 6px;
  border: 1px solid rgba(255,255,255,0.15);
  background: rgba(255,255,255,0.06);
  color: #d6d3d1;
  cursor: pointer;
  transition: all 0.2s;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  display: flex; align-items: center; gap: 0.4rem;
}

.header-btn:hover { background: rgba(255,255,255,0.12); color: #fff; }
.header-btn.danger:hover { background: rgba(220,38,38,0.2); border-color: rgba(220,38,38,0.3); color: #fca5a5; }

/* ─── STATS BAR ─── */
.stats-bar {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  gap: 1.5rem;
  padding: 1rem 1.25rem;
  background: rgba(255,255,255,0.04);
  border-radius: 10px;
  border: 1px solid rgba(255,255,255,0.06);
}

.stat-group {
  display: flex;
  gap: 2rem;
}

.stat-group.end { justify-content: flex-end; }

.stat { text-align: center; }
.stat-value {
  font-family: var(--mono);
  font-size: 1.6rem;
  font-weight: 500;
  line-height: 1;
}
.stat-label {
  font-family: var(--mono);
  font-size: 0.6rem;
  text-transform: uppercase;
  letter-spacing: 0.15em;
  color: #78716c;
  margin-top: 4px;
}

.overall-ring {
  width: 80px; height: 80px;
  position: relative;
}

.overall-ring svg { transform: rotate(-90deg); }
.overall-ring .ring-bg { stroke: rgba(255,255,255,0.08); }
.overall-ring .ring-fill { transition: stroke-dashoffset 0.8s cubic-bezier(0.4,0,0.2,1); }
.overall-pct {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-family: var(--mono);
  font-size: 1.1rem;
  font-weight: 500;
}
.overall-pct small {
  font-size: 0.55rem;
  text-transform: uppercase;
  letter-spacing: 0.15em;
  color: #78716c;
}

/* ─── MAIN CONTENT ─── */
.main-content {
  max-width: 1200px;
  margin: 0 auto;
  padding: 1.5rem 2rem 4rem;
}

/* ─── SECTION NAV ─── */
.section-nav {
  display: flex;
  flex-wrap: wrap;
  gap: 0.35rem;
  margin-bottom: 1.5rem;
  padding: 0.75rem;
  background: var(--bg-card);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  box-shadow: var(--shadow);
}

.section-nav a {
  font-family: var(--mono);
  font-size: 0.65rem;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  padding: 0.35rem 0.6rem;
  border-radius: 5px;
  text-decoration: none;
  color: var(--text-muted);
  transition: all 0.15s;
  white-space: nowrap;
}

.section-nav a:hover {
  background: var(--bg-hover);
  color: var(--text);
}

/* ─── CHECKLIST SECTION ─── */
.cl-section {
  margin-bottom: 1rem;
  background: var(--bg-card);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  box-shadow: var(--shadow);
  overflow: hidden;
  transition: box-shadow 0.2s;
}

.cl-section:hover { box-shadow: var(--shadow-lg); }

.cl-section-header {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  padding: 0.85rem 1rem;
  cursor: pointer;
  user-select: none;
  transition: background 0.15s;
  border-bottom: 1px solid transparent;
}

.cl-section-header:hover { background: var(--bg-hover); }
.cl-section.open .cl-section-header { border-bottom-color: var(--border-light); }

.cl-section-icon {
  width: 32px; height: 32px;
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.95rem;
  flex-shrink: 0;
}

.cl-section-title {
  flex: 1;
  min-width: 0;
}

.cl-section-title h2 {
  font-family: var(--mono);
  font-size: 0.75rem;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  line-height: 1.3;
}

.cl-section-title .sub {
  font-family: var(--sans);
  font-size: 0.72rem;
  color: var(--text-muted);
  margin-top: 1px;
}

.cl-section-meta {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  flex-shrink: 0;
}

.cl-count {
  font-family: var(--mono);
  font-size: 0.7rem;
  color: var(--text-muted);
  white-space: nowrap;
}

.cl-progress-mini {
  width: 80px; height: 4px;
  background: var(--border);
  border-radius: 2px;
  overflow: hidden;
}

.cl-progress-mini-bar {
  height: 100%;
  border-radius: 2px;
  transition: width 0.4s cubic-bezier(0.4,0,0.2,1), background 0.3s;
}

.cl-chevron {
  width: 18px; height: 18px;
  color: var(--text-muted);
  transition: transform 0.25s cubic-bezier(0.4,0,0.2,1);
  flex-shrink: 0;
}

.cl-section.open .cl-chevron { transform: rotate(180deg); }

/* ─── CHECKLIST BODY ─── */
.cl-body {
  display: none;
  padding: 0;
}

.cl-section.open .cl-body { display: block; }

/* Subsection */
.cl-subsection {
  padding: 0.5rem 0;
}

.cl-subsection:not(:last-child) {
  border-bottom: 1px solid var(--border-light);
}

.cl-subsection-title {
  font-family: var(--serif);
  font-size: 0.82rem;
  font-weight: 600;
  color: var(--text-secondary);
  padding: 0.3rem 1rem 0.25rem 1rem;
  display: flex;
  align-items: center;
  gap: 0.5rem;
}

.cl-subsection-title::before {
  content: '';
  width: 3px; height: 14px;
  background: var(--accent);
  border-radius: 2px;
  flex-shrink: 0;
}

/* Item */
.cl-item {
  display: flex;
  align-items: flex-start;
  gap: 0.6rem;
  padding: 0.4rem 1rem 0.4rem 1.5rem;
  transition: background 0.1s;
  cursor: pointer;
}

.cl-item:hover { background: var(--bg-hover); }
.cl-item.checked { background: var(--bg-checked); }

.cl-item input[type="checkbox"] {
  -webkit-appearance: none;
  appearance: none;
  width: 16px; height: 16px;
  border: 1.5px solid var(--border);
  border-radius: 4px;
  cursor: pointer;
  flex-shrink: 0;
  margin-top: 2px;
  position: relative;
  transition: all 0.15s;
  background: var(--bg-card);
}

.cl-item input[type="checkbox"]:checked {
  background: var(--green);
  border-color: var(--green);
}

.cl-item input[type="checkbox"]:checked::after {
  content: '';
  position: absolute;
  top: 2px; left: 4.5px;
  width: 4px; height: 7px;
  border: solid white;
  border-width: 0 1.5px 1.5px 0;
  transform: rotate(45deg);
}

.cl-item label {
  font-family: var(--sans);
  font-size: 0.78rem;
  color: var(--text);
  line-height: 1.5;
  cursor: pointer;
  flex: 1;
  transition: color 0.15s;
}

.cl-item.checked label {
  color: var(--text-muted);
  text-decoration: line-through;
  text-decoration-color: var(--border);
}

.cl-item code {
  font-family: var(--mono);
  font-size: 0.7rem;
  background: var(--bg-section);
  padding: 0.1rem 0.35rem;
  border-radius: 3px;
  border: 1px solid var(--border-light);
  color: var(--accent);
}

/* ─── COVERAGE TABLE ─── */
.coverage-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.78rem;
}

.coverage-table th {
  font-family: var(--mono);
  font-size: 0.65rem;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--text-muted);
  text-align: left;
  padding: 0.5rem 1rem;
  border-bottom: 2px solid var(--border);
  font-weight: 500;
}

.coverage-table td {
  padding: 0.5rem 1rem;
  border-bottom: 1px solid var(--border-light);
}

.coverage-table tr:hover td { background: var(--bg-hover); }

.badge {
  font-family: var(--mono);
  font-size: 0.6rem;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  padding: 0.2rem 0.5rem;
  border-radius: 4px;
  font-weight: 500;
  display: inline-flex;
  align-items: center;
  gap: 0.3rem;
}

.badge.good { background: var(--green-bg); color: var(--green); }
.badge.gap { background: var(--red-bg); color: var(--red); }

/* ─── UTILITIES ─── */
.progress-green { background: var(--green); }
.progress-yellow { background: var(--yellow); }
.progress-red { background: var(--red); }

.text-green { color: var(--green); }
.text-yellow { color: var(--yellow); }
.text-red { color: var(--red); }

/* ─── PRINT ─── */
@media print {
  .site-header { padding: 1rem; break-after: avoid; }
  .header-actions, .section-nav, .cl-chevron, .header-btn { display: none !important; }
  .main-content { padding: 0.5rem; }
  .cl-section { break-inside: avoid; box-shadow: none; border: 1px solid #ccc; margin-bottom: 0.5rem; }
  .cl-body { display: block !important; }
  .cl-section-header { cursor: default; }
  .stats-bar { background: none; border: 1px solid #ccc; }
  .cl-item input[type="checkbox"] { print-color-adjust: exact; -webkit-print-color-adjust: exact; }
  body { font-size: 10pt; }
}

/* ─── RESPONSIVE ─── */
@media (max-width: 768px) {
  .site-header { padding: 1.5rem 1rem 1rem; }
  .main-content { padding: 1rem; }
  .stats-bar { grid-template-columns: 1fr; gap: 1rem; text-align: center; }
  .stat-group { justify-content: center; }
  .stat-group.end { justify-content: center; }
  .header-top { flex-direction: column; }
  .header-actions { justify-content: flex-start; }
  .cl-progress-mini { width: 50px; }
  .section-nav { gap: 0.25rem; }
}

/* ─── TOAST ─── */
.toast {
  position: fixed;
  bottom: 1.5rem;
  right: 1.5rem;
  font-family: var(--mono);
  font-size: 0.72rem;
  padding: 0.6rem 1rem;
  border-radius: 8px;
  background: var(--header-from);
  color: #fafaf9;
  box-shadow: var(--shadow-lg);
  z-index: 100;
  animation: toastIn 0.3s ease-out;
}

@keyframes toastIn {
  from { transform: translateY(10px); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}

/* ─── FADE IN ─── */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}
.fade-up { animation: fadeUp 0.35s ease-out both; }
</style>
</head>
<body>

<!-- HEADER -->
<header class="site-header">
  <div class="header-inner">
    <div class="header-top">
      <div class="brand">
        <div class="brand-icon">◆</div>
        <div>
          <h1>DotMac ERP</h1>
          <p>Go-Live Readiness Checklist</p>
        </div>
      </div>
      <div class="header-actions">
        <button class="header-btn" @click="expandAll()">↕ Expand All</button>
        <button class="header-btn" @click="collapseAll()">⊟ Collapse</button>
        <button class="header-btn" @click="window.print()">⎙ Print</button>
        <button class="header-btn" @click="darkMode = !darkMode; localStorage.setItem('cl-dark', darkMode)">
          <span x-text="darkMode ? '☀' : '☾'"></span> Theme
        </button>
        <button class="header-btn danger" @click="if(confirm('Reset all checkboxes? This cannot be undone.')) resetAll()">⟲ Reset</button>
      </div>
    </div>

    <div class="stats-bar">
      <div class="stat-group">
        <div class="stat">
          <div class="stat-value" x-text="totalChecked" :class="totalChecked > 0 ? 'text-green' : ''"></div>
          <div class="stat-label">Completed</div>
        </div>
        <div class="stat">
          <div class="stat-value" x-text="totalItems - totalChecked" :class="totalItems - totalChecked > 0 ? 'text-yellow' : ''"></div>
          <div class="stat-label">Remaining</div>
        </div>
        <div class="stat">
          <div class="stat-value" x-text="totalItems"></div>
          <div class="stat-label">Total Items</div>
        </div>
      </div>

      <div class="overall-ring">
        <svg viewBox="0 0 36 36" width="80" height="80">
          <circle class="ring-bg" cx="18" cy="18" r="15.5" fill="none" stroke-width="3"/>
          <circle class="ring-fill" cx="18" cy="18" r="15.5" fill="none" stroke-width="3"
            :stroke="overallPct >= 66 ? 'var(--green)' : overallPct >= 33 ? 'var(--yellow)' : 'var(--red)'"
            stroke-linecap="round"
            :stroke-dasharray="97.39"
            :stroke-dashoffset="97.39 - (97.39 * overallPct / 100)"/>
        </svg>
        <div class="overall-pct">
          <span x-text="overallPct + '%'"></span>
          <small>Done</small>
        </div>
      </div>

      <div class="stat-group end">
        <div class="stat">
          <div class="stat-value">12</div>
          <div class="stat-label">Sections</div>
        </div>
        <div class="stat">
          <div class="stat-value">9</div>
          <div class="stat-label">Modules</div>
        </div>
      </div>
    </div>
  </div>
</header>

<!-- MAIN -->
<main class="main-content">

  <!-- Section Navigation -->
  <nav class="section-nav fade-up" style="animation-delay:0.1s">
    <template x-for="(section, i) in sections" :key="i">
      <a :href="'#section-' + i" x-text="section.short || section.title" @click.prevent="openSections[i] = true; $nextTick(() => document.getElementById('section-' + i)?.scrollIntoView({behavior:'smooth', block:'start'}))"></a>
    </template>
  </nav>

  <!-- Sections -->
  <template x-for="(section, si) in sections" :key="si">
    <div class="cl-section fade-up" :class="{ open: openSections[si] }" :id="'section-' + si" :style="'animation-delay:' + (0.05 * si + 0.15) + 's'">
      <div class="cl-section-header" @click="openSections[si] = !openSections[si]">
        <div class="cl-section-icon" :style="'background:' + section.iconBg + '; color:' + section.iconColor" x-text="section.icon"></div>
        <div class="cl-section-title">
          <h2 x-text="(si + 1) + '. ' + section.title"></h2>
          <div class="sub" x-text="section.desc"></div>
        </div>
        <div class="cl-section-meta">
          <span class="cl-count" x-text="sectionChecked(si) + '/' + sectionTotal(si)"></span>
          <div class="cl-progress-mini">
            <div class="cl-progress-mini-bar" :style="'width:' + sectionPct(si) + '%'" :class="sectionPct(si) >= 66 ? 'progress-green' : sectionPct(si) >= 33 ? 'progress-yellow' : 'progress-red'"></div>
          </div>
          <svg class="cl-chevron" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M5.23 7.21a.75.75 0 011.06.02L10 11.168l3.71-3.938a.75.75 0 111.08 1.04l-4.25 4.5a.75.75 0 01-1.08 0l-4.25-4.5a.75.75 0 01.02-1.06z"/></svg>
        </div>
      </div>
      <div class="cl-body">
        <template x-for="(sub, subi) in section.subs" :key="subi">
          <div class="cl-subsection">
            <div class="cl-subsection-title" x-show="sub.label" x-text="sub.label"></div>
            <template x-for="(item, ii) in sub.items" :key="ii">
              <div class="cl-item" :class="{ checked: isChecked(si, subi, ii) }" @click="toggle(si, subi, ii)">
                <input type="checkbox" :checked="isChecked(si, subi, ii)" @click.stop="toggle(si, subi, ii)">
                <label x-html="item" @click.stop="toggle(si, subi, ii)"></label>
              </div>
            </template>
          </div>
        </template>

        <!-- Coverage table for section 12 -->
        <template x-if="section.coverage">
          <div style="padding: 0.5rem 1rem 1rem">
            <table class="coverage-table">
              <thead><tr><th>Module</th><th>Tests</th><th>Status</th></tr></thead>
              <tbody>
                <template x-for="row in section.coverage" :key="row.name">
                  <tr>
                    <td x-text="row.name" style="font-weight:500"></td>
                    <td style="font-family:var(--mono)" x-text="row.tests"></td>
                    <td><span class="badge" :class="row.good ? 'good' : 'gap'" x-text="row.good ? '✓ Good' : '✗ Gap'"></span></td>
                  </tr>
                </template>
              </tbody>
            </table>
          </div>
        </template>
      </div>
    </div>
  </template>
</main>

<!-- Toast -->
<div class="toast" x-show="toast" x-text="toast" x-transition x-cloak
     @click="toast = ''"
     x-init="$watch('toast', v => { if(v) setTimeout(() => toast = '', 2500) })"></div>

<script>
function checklist() {
  const STORAGE_KEY = 'dotmac-golive-v1';

  const sections = [
    {

  // Build flat index for checkbox state
  let itemIndex = [];
  sections.forEach((sec, si) => {
    sec.subs.forEach((sub, subi) => {
      sub.items.forEach((_, ii) => {
        itemIndex.push(`${si}-${subi}-${ii}`);
      });
    });
  });

  // Load state
  let saved = {};
  try { saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); } catch(e) {}

  return {
    sections,
    openSections: sections.map(() => false),
    checked: saved,
    toast: '',
    darkMode: localStorage.getItem('cl-dark') === 'true',

    isChecked(si, subi, ii) { return !!this.checked[`${si}-${subi}-${ii}`]; },
    toggle(si, subi, ii) {
      const key = `${si}-${subi}-${ii}`;
      this.checked[key] = !this.checked[key];
      if (!this.checked[key]) delete this.checked[key];
      this.save();
    },

    save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(this.checked)); },

    sectionTotal(si) {
      return this.sections[si].subs.reduce((t, s) => t + s.items.length, 0);
    },
    sectionChecked(si) {
      let c = 0;
      this.sections[si].subs.forEach((sub, subi) => {
        sub.items.forEach((_, ii) => {
          if (this.checked[`${si}-${subi}-${ii}`]) c++;
        });
      });
      return c;
    },
    sectionPct(si) {
      const t = this.sectionTotal(si);
      return t ? Math.round(this.sectionChecked(si) / t * 100) : 0;
    },

    get totalItems() {
      return this.sections.reduce((t, _, si) => t + this.sectionTotal(si), 0);
    },
    get totalChecked() {
      return Object.keys(this.checked).filter(k => this.checked[k]).length;
    },
    get overallPct() {
      return this.totalItems ? Math.round(this.totalChecked / this.totalItems * 100) : 0;
    },

    expandAll() { this.openSections = this.sections.map(() => true); },
    collapseAll() { this.openSections = this.sections.map(() => false); },
    resetAll() {
      this.checked = {};
      this.save();
      this.toast = 'All items reset';
    },
  };
