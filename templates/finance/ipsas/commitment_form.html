{% extends "finance/base_finance.html" %}

{% block page_title %}New Commitment{% endblock %}

{% block breadcrumbs %}
<nav class="flex text-sm text-slate-500 dark:text-slate-400" aria-label="Breadcrumb">
    <a href="/dashboard" class="hover:text-primary-600 dark:hover:text-primary-400">Dashboard</a>
    <span class="mx-2">/</span>
    <a href="/finance/ipsas/commitments" class="hover:text-primary-600 dark:hover:text-primary-400">Commitments</a>
    <span class="mx-2">/</span>
    <span class="text-slate-900 dark:text-white" aria-current="page">New Commitment</span>
</nav>
{% endblock %}

{% block content %}
<div class="mx-auto max-w-2xl">
    <form method="POST" action="/finance/ipsas/commitments/new" class="space-y-6">
        <input type="hidden" name="csrf_token" value="{{ request.state.csrf_token }}">
        <div class="rounded-xl border border-slate-200 bg-white p-6 dark:border-slate-800 dark:bg-slate-800/50">
            <h3 class="text-lg font-semibold text-slate-900 dark:text-white mb-6 font-display">Budget Commitment</h3>

            <div class="space-y-4">
                <div class="grid gap-4 sm:grid-cols-2">
                    <div>
                        <label for="commitment_number" class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Commitment Number <span class="text-rose-500">*</span></label>
                        <input type="text" id="commitment_number" name="commitment_number" required maxlength="30"
                               class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm dark:border-slate-600 dark:bg-slate-700 dark:text-white"
                               placeholder="CMT-001">
                    </div>
                    <div>
                        <label for="commitment_type" class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Commitment Type <span class="text-rose-500">*</span></label>
                        <select id="commitment_type" name="commitment_type" required
                                class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm dark:border-slate-600 dark:bg-slate-700 dark:text-white">
                            {% for ct in commitment_types %}
                            <option value="{{ ct.value }}">{{ ct.label }}</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>

                <div>
                    <label for="fund_id" class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Fund <span class="text-rose-500">*</span></label>
                    <select id="fund_id" name="fund_id" required
                            class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm dark:border-slate-600 dark:bg-slate-700 dark:text-white">
                        <option value="">Select fund...</option>
                        {% for f in funds %}
                        <option value="{{ f.fund_id }}">{{ f.fund_code }} - {{ f.fund_name }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div>
                    <label for="appropriation_id" class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Appropriation (optional)</label>
                    <select id="appropriation_id" name="appropriation_id"
                            class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm dark:border-slate-600 dark:bg-slate-700 dark:text-white">
                        <option value="">None</option>
                        {% for a in appropriations %}
                        <option value="{{ a.appropriation_id }}">{{ a.appropriation_code }} - {{ a.appropriation_name }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div>
                    <label for="account_id" class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">GL Account <span class="text-rose-500">*</span></label>
                    <select id="account_id" name="account_id" required
                            class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm dark:border-slate-600 dark:bg-slate-700 dark:text-white">
                        <option value="">Select account...</option>
                        {% for a in accounts %}
                        <option value="{{ a.account_id }}">{{ a.account_code }} - {{ a.account_name }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="grid gap-4 sm:grid-cols-2">
                    <div>
                        <label for="fiscal_year_id" class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Fiscal Year <span class="text-rose-500">*</span></label>
                        <select id="fiscal_year_id" name="fiscal_year_id" required
                                class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm dark:border-slate-600 dark:bg-slate-700 dark:text-white">
                            <option value="">Select...</option>
                            {% for fy in fiscal_years %}
                            <option value="{{ fy.fiscal_year_id }}">{{ fy.year_name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div>
                        <label for="fiscal_period_id" class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Fiscal Period <span class="text-rose-500">*</span></label>
                        <select id="fiscal_period_id" name="fiscal_period_id" required
                                class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm dark:border-slate-600 dark:bg-slate-700 dark:text-white">
                            <option value="">Select...</option>
                            {% for fp in fiscal_periods %}
                            <option value="{{ fp.fiscal_period_id }}">{{ fp.period_name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>

                <div class="grid gap-4 sm:grid-cols-2">
                    <div>
                        <label for="committed_amount" class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Committed Amount <span class="text-rose-500">*</span></label>
                        <input type="number" id="committed_amount" name="committed_amount" required step="0.01" min="0.01"
                               class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm dark:border-slate-600 dark:bg-slate-700 dark:text-white">
                    </div>
                    <div>
                        <label for="currency_code" class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Currency <span class="text-rose-500">*</span></label>
                        <input type="text" id="currency_code" name="currency_code" required maxlength="3" value="{{ organization.base_currency if organization and organization.base_currency else 'USD' }}"
                               class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm dark:border-slate-600 dark:bg-slate-700 dark:text-white">
                    </div>
                </div>
            </div>
        </div>

        <div class="flex justify-end gap-3">
            <a href="/finance/ipsas/commitments"
               class="rounded-lg border border-slate-300 px-4 py-2 text-sm font-medium text-slate-700 hover:bg-slate-50 dark:border-slate-600 dark:text-slate-300 dark:hover:bg-slate-700">
                Cancel
            </a>
            <button type="submit"
                    class="rounded-lg bg-gradient-to-r from-primary-600 to-primary-500 px-4 py-2 text-sm font-medium text-white shadow-lg shadow-primary-500/25 btn-hover">
                Create Commitment
            </button>
        </div>
    </form>
</div>
{% endblock %}
