{% extends "finance/base_finance.html" %}

{% block page_title %}New Appropriation{% endblock %}

{% block breadcrumbs %}
<nav class="flex text-sm text-slate-500 dark:text-slate-400" aria-label="Breadcrumb">
    <a href="/dashboard" class="hover:text-primary-600 dark:hover:text-primary-400">Dashboard</a>
    <span class="mx-2">/</span>
    <a href="/finance/ipsas/appropriations" class="hover:text-primary-600 dark:hover:text-primary-400">Appropriations</a>
    <span class="mx-2">/</span>
    <span class="text-slate-900 dark:text-white" aria-current="page">New Appropriation</span>
</nav>
{% endblock %}

{% block content %}
<div class="mx-auto max-w-2xl">
    <form method="POST" action="/finance/ipsas/appropriations/new" class="space-y-6">
        <input type="hidden" name="csrf_token" value="{{ request.state.csrf_token }}">
        <div class="rounded-xl border border-slate-200 bg-white p-6 dark:border-slate-800 dark:bg-slate-800/50">
            <h3 class="text-lg font-semibold text-slate-900 dark:text-white mb-6 font-display">Appropriation Details</h3>

            <div class="grid gap-4 sm:grid-cols-2">
                <div>
                    <label for="appropriation_code" class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Code</label>
                    <input type="text" id="appropriation_code" name="appropriation_code" required maxlength="30"
                           class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm dark:border-slate-600 dark:bg-slate-700 dark:text-white"
                           placeholder="e.g. APP-2026-001">
                </div>
                <div>
                    <label for="appropriation_type" class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Type</label>
                    <select id="appropriation_type" name="appropriation_type" required
                            class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm dark:border-slate-600 dark:bg-slate-700 dark:text-white">
                        <option value="ORIGINAL">Original</option>
                        <option value="SUPPLEMENTARY">Supplementary</option>
                    </select>
                </div>
            </div>

            <div class="mt-4">
                <label for="appropriation_name" class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Name</label>
                <input type="text" id="appropriation_name" name="appropriation_name" required maxlength="200"
                       class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm dark:border-slate-600 dark:bg-slate-700 dark:text-white"
                       placeholder="Personnel Emoluments Appropriation">
            </div>

            <div class="mt-4 grid gap-4 sm:grid-cols-2">
                <div>
                    <label for="fund_id" class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Fund</label>
                    <select id="fund_id" name="fund_id" required
                            class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm dark:border-slate-600 dark:bg-slate-700 dark:text-white">
                        <option value="">Select fund...</option>
                        {% for fund in funds %}
                        <option value="{{ fund.fund_id }}">{{ fund.fund_code }} - {{ fund.fund_name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div>
                    <label for="fiscal_year_id" class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Fiscal Year</label>
                    <select id="fiscal_year_id" name="fiscal_year_id" required
                            class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm dark:border-slate-600 dark:bg-slate-700 dark:text-white">
                        <option value="">Select year...</option>
                        {% for fy in fiscal_years %}
                        <option value="{{ fy.fiscal_year_id }}">{{ fy.year_name }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <div class="mt-4 grid gap-4 sm:grid-cols-2">
                <div>
                    <label for="approved_amount" class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Approved Amount</label>
                    <input type="number" id="approved_amount" name="approved_amount" required step="0.01" min="0"
                           class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm dark:border-slate-600 dark:bg-slate-700 dark:text-white">
                </div>
                <div>
                    <label for="currency_code" class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Currency</label>
                    <input type="text" id="currency_code" name="currency_code" required maxlength="3" value="{{ organization.base_currency if organization and organization.base_currency else 'USD' }}"
                           class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm dark:border-slate-600 dark:bg-slate-700 dark:text-white">
                </div>
            </div>

            <div class="mt-4 grid gap-4 sm:grid-cols-2">
                <div>
                    <label for="effective_from" class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Effective From</label>
                    <input type="date" id="effective_from" name="effective_from" required
                           class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm dark:border-slate-600 dark:bg-slate-700 dark:text-white">
                </div>
                <div>
                    <label for="effective_to" class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Effective To</label>
                    <input type="date" id="effective_to" name="effective_to"
                           class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm dark:border-slate-600 dark:bg-slate-700 dark:text-white">
                </div>
            </div>

            <div class="mt-4">
                <label for="appropriation_act_reference" class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Act Reference</label>
                <input type="text" id="appropriation_act_reference" name="appropriation_act_reference" maxlength="100"
                       class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm dark:border-slate-600 dark:bg-slate-700 dark:text-white"
                       placeholder="e.g. Appropriation Act 2026, Section 5">
            </div>
        </div>

        <div class="flex justify-end gap-3">
            <a href="/finance/ipsas/appropriations"
               class="rounded-lg border border-slate-300 px-4 py-2 text-sm font-medium text-slate-700 hover:bg-slate-50 dark:border-slate-600 dark:text-slate-300 dark:hover:bg-slate-700">
                Cancel
            </a>
            <button type="submit"
                    class="rounded-lg bg-gradient-to-r from-primary-600 to-primary-500 px-4 py-2 text-sm font-medium text-white shadow-lg shadow-primary-500/25 btn-hover">
                Create Appropriation
            </button>
        </div>
    </form>
</div>
{% endblock %}
