{# Shared sidebar header for module shells (non-admin) #}
<div class="flex h-16 items-center border-b border-slate-200 dark:border-slate-800"
     :class="sidebarCollapsed ? 'justify-center px-2' : 'justify-between px-4'">
    <a href="{{ brand_href }}" class="flex min-w-0 flex-1 items-center gap-3" x-show="!sidebarCollapsed" x-cloak>
        {% if brand_logo_url %}
        <img src="{{ brand_logo_url }}" alt="{{ brand_name }} logo" class="h-9 w-9 rounded-lg object-cover shadow-sm" />
        {% else %}
        <div class="flex h-9 w-9 items-center justify-center rounded-lg bg-gradient-to-br {{ module_logo_bg }} text-xs font-semibold uppercase text-white shadow-lg {{ module_logo_shadow }}">
            {{ brand_mark }}
        </div>
        {% endif %}
        <div class="min-w-0">
            <p class="truncate text-sm font-semibold text-slate-900 dark:text-white" title="{{ brand_name }}">{{ brand_name }}</p>
            <span class="mt-0.5 hidden sm:inline-flex items-center rounded-full border px-2 py-0.5 text-[10px] font-semibold uppercase tracking-wide {{ module_pill_class }}">{{ module_label }}</span>
        </div>
    </a>
    <button @click="closeSidebar()" x-show="!isDesktop" x-cloak
            class="flex-shrink-0 rounded-lg p-2 text-slate-400 hover:bg-slate-100 hover:text-slate-600 dark:hover:bg-slate-800 dark:hover:text-slate-300 transition-colors"
            aria-label="Close sidebar">
        <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
        </svg>
    </button>
    <button @click="sidebarCollapsed = false; sidebarCollapsedStored = false; localStorage.setItem('appSidebarCollapsed', false)" x-show="isDesktop && sidebarCollapsed" x-cloak
            class="flex h-9 w-9 flex-shrink-0 items-center justify-center rounded-lg bg-gradient-to-br {{ module_logo_bg }} text-xs font-semibold uppercase text-white shadow-lg {{ module_logo_shadow }} hover:opacity-90 transition-opacity"
            aria-label="Expand sidebar" title="Expand sidebar">
        {% if brand_logo_url %}
        <img src="{{ brand_logo_url }}" alt="{{ brand_name }} logo" class="h-9 w-9 rounded-lg object-cover" />
        {% else %}
        {{ brand_mark }}
        {% endif %}
    </button>
    <button @click="sidebarCollapsed = true; sidebarCollapsedStored = true; localStorage.setItem('appSidebarCollapsed', true)" x-show="isDesktop && !sidebarCollapsed" x-cloak
            class="flex-shrink-0 rounded-lg p-2 text-slate-400 hover:bg-slate-100 hover:text-slate-600 dark:hover:bg-slate-800 dark:hover:text-slate-300 transition-colors"
            aria-label="Collapse sidebar">
        <svg class="h-5 w-5 transition-transform duration-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 19l-7-7 7-7m8 14l-7-7 7-7"/>
        </svg>
    </button>
</div>
