{% extends "careers/base_careers.html" %}

{% block title %}Offer Link Expired - {{ org_name }}{% endblock %}

{% block content %}
<section class="py-16">
    <div class="mx-auto max-w-2xl px-4 sm:px-6 lg:px-8">
        <div class="rounded-2xl border border-slate-200 bg-white p-8 text-center shadow-sm dark:border-slate-800 dark:bg-slate-900">
            <h1 class="text-2xl font-semibold text-slate-900 dark:text-white">Offer Link Expired</h1>
            <p class="mt-3 text-sm text-slate-500 dark:text-slate-400">
                This offer link is invalid or has expired. Please contact the recruiting team for a new link.
            </p>
            <a href="/careers/{{ org_slug }}" class="btn btn-secondary mt-6">Back to Careers</a>
        </div>
    </div>
</section>
{% endblock %}
