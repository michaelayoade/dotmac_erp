{% extends "modules/base_modules.html" %}

{% block page_title %}Schedule Maintenance{% endblock %}

{% block breadcrumbs %}
<nav class="flex items-center gap-2 text-sm text-slate-500 dark:text-slate-400" aria-label="Breadcrumb">
    <a href="/fleet" class="hover:text-amber-600 dark:hover:text-amber-400 transition-colors">Fleet</a>
    <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
    </svg>
    <a href="/fleet" class="hover:text-amber-600 dark:hover:text-amber-400 transition-colors">Fleet</a>
    <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
    </svg>
    <a href="/fleet/maintenance" class="hover:text-amber-600 dark:hover:text-amber-400 transition-colors">Maintenance</a>
    <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
    </svg>
    <span class="font-medium text-slate-900 dark:text-white" aria-current="page">Schedule</span>
</nav>
{% endblock %}

{% block content %}
<div class="max-w-4xl mx-auto">
    <form method="POST" action="/api/v1/fleet/maintenance" class="space-y-6">
        {{ request.state.csrf_form | safe }}
        <!-- Vehicle & Type -->
        <div class="card">
            <div class="px-4 py-3 border-b border-slate-100 dark:border-slate-800">
                <h3 class="font-semibold text-slate-900 dark:text-white">Maintenance Details</h3>
            </div>
            <div class="p-4 space-y-4">
                <div class="grid gap-4 sm:grid-cols-2">
                    <div>
                        <label for="vehicle_id" class="form-label">Vehicle <span class="text-rose-500">*</span></label>
                        <select id="vehicle_id" name="vehicle_id" required class="form-select">
                            <option value="">Select vehicle...</option>
                            {% for v in vehicles %}
                            <option value="{{ v.vehicle_id }}" {{ 'selected' if selected_vehicle_id and selected_vehicle_id|string == v.vehicle_id|string else '' }}>
                                {{ v.registration_number }} - {{ v.make }} {{ v.model }}
                            </option>
                            {% endfor %}
                        </select>
                    </div>
                    <div>
                        <label for="maintenance_type" class="form-label">Maintenance Type <span class="text-rose-500">*</span></label>
                        <select id="maintenance_type" name="maintenance_type" required class="form-select">
                            <option value="">Select type...</option>
                            {% for mt in maintenance_types %}
                            <option value="{{ mt }}">{{ mt | replace('_', ' ') | title }}</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>

                <div>
                    <label for="description" class="form-label">Description <span class="text-rose-500">*</span></label>
                    <textarea id="description" name="description" required rows="3"
                              placeholder="Describe the maintenance needed..."
                              class="form-textarea"></textarea>
                </div>

                <div class="grid gap-4 sm:grid-cols-2">
                    <div>
                        <label for="scheduled_date" class="form-label">Scheduled Date <span class="text-rose-500">*</span></label>
                        <input type="date" id="scheduled_date" name="scheduled_date" required class="form-input">
                    </div>
                    <div>
                        <label for="odometer_at_service" class="form-label">Odometer Reading (km)</label>
                        <input type="number" id="odometer_at_service" name="odometer_at_service"
                               min="0" step="1" placeholder="Current reading"
                               class="form-input">
                    </div>
                </div>
            </div>
        </div>

        <!-- Cost & Supplier -->
        <div class="card">
            <div class="px-4 py-3 border-b border-slate-100 dark:border-slate-800">
                <h3 class="font-semibold text-slate-900 dark:text-white">Cost Estimate</h3>
            </div>
            <div class="p-4 space-y-4">
                <div class="grid gap-4 sm:grid-cols-2">
                    <div>
                        <label for="estimated_cost" class="form-label">Estimated Cost</label>
                        <input type="number" id="estimated_cost" name="estimated_cost"
                               min="0" step="0.01" placeholder="0.00"
                               class="form-input">
                    </div>
                    <div>
                        <label for="technician_name" class="form-label">Technician / Garage</label>
                        <input type="text" id="technician_name" name="technician_name"
                               placeholder="Name of technician or garage"
                               class="form-input">
                    </div>
                </div>
            </div>
        </div>

        <!-- Notes -->
        <div class="card">
            <div class="px-4 py-3 border-b border-slate-100 dark:border-slate-800">
                <h3 class="font-semibold text-slate-900 dark:text-white">Notes</h3>
            </div>
            <div class="p-4">
                <textarea id="notes" name="notes" rows="3"
                          placeholder="Additional notes..."
                          class="form-textarea"></textarea>
            </div>
        </div>

        <!-- Actions -->
        <div class="flex items-center justify-end gap-3 pt-6 border-t border-slate-200 dark:border-slate-700">
            <a href="/fleet/maintenance" class="btn btn-secondary">Cancel</a>
            <button type="submit" class="btn btn-primary">
                <svg class="h-4 w-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
                </svg>
                Schedule Maintenance
            </button>
        </div>
    </form>
</div>
{% endblock %}
