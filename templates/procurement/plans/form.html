{% extends "procurement/base_procurement.html" %}

{% block page_title %}New Procurement Plan{% endblock %}

{% block breadcrumbs %}
<nav class="flex items-center gap-2 text-sm text-slate-500 dark:text-slate-400">
    <a href="/procurement" class="hover:text-amber-600 transition-colors">Procurement</a>
    <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
    <a href="/procurement/plans" class="hover:text-amber-600 transition-colors">Plans</a>
    <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
    <span class="font-medium text-slate-900 dark:text-white">New</span>
</nav>
{% endblock %}

{% block content %}
<div class="max-w-2xl stagger-in">
    <div class="card p-6">
        <h2 class="text-lg font-semibold text-slate-900 dark:text-white mb-4">Create Procurement Plan</h2>
        <form method="post" class="space-y-4">
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Plan Number</label>
                    <input type="text" name="plan_number" required class="input-field" placeholder="PP-2025-001">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Fiscal Year</label>
                    <input type="text" name="fiscal_year" required class="input-field" placeholder="2025/2026">
                </div>
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Title</label>
                <input type="text" name="title" required class="input-field" placeholder="Annual Procurement Plan">
            </div>
            <div class="flex justify-end gap-3 pt-4">
                <a href="/procurement/plans" class="btn btn-secondary">Cancel</a>
                <button type="submit" class="btn btn-primary">Create Plan</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
