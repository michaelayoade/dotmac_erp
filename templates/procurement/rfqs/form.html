{% extends "procurement/base_procurement.html" %}

{% block page_title %}New RFQ{% endblock %}

{% block breadcrumbs %}
<nav class="flex items-center gap-2 text-sm text-slate-500 dark:text-slate-400" aria-label="Breadcrumb">
    <a href="/procurement" class="hover:text-amber-600 transition-colors">Procurement</a>
    <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
    <a href="/procurement/rfqs" class="hover:text-amber-600 transition-colors">RFQs</a>
    <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
    <span class="font-medium text-slate-900 dark:text-white" aria-current="page">New</span>
</nav>
{% endblock %}

{% block content %}
<div class="max-w-2xl stagger-in">
    <div class="card p-6">
        <h2 class="text-lg font-semibold text-slate-900 dark:text-white mb-4">Create Request for Quotation</h2>
        <form method="post" class="space-y-4">
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">RFQ Number</label>
                    <input type="text" name="rfq_number" required class="input-field" placeholder="RFQ-2025-001">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Procurement Method</label>
                    <select name="procurement_method" required class="input-field">
                        {% for m in procurement_methods %}
                        <option value="{{ m.value }}">{{ m.value }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Title</label>
                <input type="text" name="title" required class="input-field" placeholder="Supply of Office Equipment">
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Published Date</label>
                    <input type="date" name="published_date" class="input-field">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Closing Date</label>
                    <input type="date" name="closing_date" required class="input-field">
                </div>
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Description</label>
                <textarea name="description" rows="3" class="input-field" placeholder="Detailed description of the procurement requirement..."></textarea>
            </div>
            <div class="flex justify-end gap-3 pt-4">
                <a href="/procurement/rfqs" class="btn btn-secondary">Cancel</a>
                <button type="submit" class="btn btn-primary">Create RFQ</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
