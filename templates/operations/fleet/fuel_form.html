{% extends "operations/base_operations.html" %}

{% block page_title %}Record Fuel Purchase{% endblock %}

{% block breadcrumbs %}
<nav class="flex items-center gap-2 text-sm text-slate-500 dark:text-slate-400">
    <a href="/operations/dashboard" class="hover:text-amber-600 dark:hover:text-amber-400 transition-colors">Operations</a>
    <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
    </svg>
    <a href="/operations/fleet" class="hover:text-amber-600 dark:hover:text-amber-400 transition-colors">Fleet</a>
    <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
    </svg>
    <a href="/operations/fleet/fuel" class="hover:text-amber-600 dark:hover:text-amber-400 transition-colors">Fuel Logs</a>
    <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
    </svg>
    <span class="font-medium text-slate-900 dark:text-white">Record</span>
</nav>
{% endblock %}

{% block content %}
<div class="max-w-4xl mx-auto">
    <form method="POST" action="/api/fleet/fuel" class="space-y-6">
        <!-- Vehicle & Date -->
        <div class="card">
            <div class="px-4 py-3 border-b border-slate-100 dark:border-slate-800">
                <h3 class="font-semibold text-slate-900 dark:text-white">Fuel Purchase Details</h3>
            </div>
            <div class="p-4 space-y-4">
                <div class="grid gap-4 sm:grid-cols-2">
                    <div>
                        <label for="vehicle_id" class="form-label">Vehicle <span class="text-rose-500">*</span></label>
                        <select id="vehicle_id" name="vehicle_id" required class="form-select">
                            <option value="">Select vehicle...</option>
                            {% for v in vehicles %}
                            <option value="{{ v.vehicle_id }}" {{ 'selected' if selected_vehicle_id and selected_vehicle_id|string == v.vehicle_id|string else '' }}>
                                {{ v.registration_number }} - {{ v.make }} {{ v.model }}
                            </option>
                            {% endfor %}
                        </select>
                    </div>
                    <div>
                        <label for="log_date" class="form-label">Date <span class="text-rose-500">*</span></label>
                        <input type="date" id="log_date" name="log_date" required class="form-input">
                    </div>
                </div>

                <div class="grid gap-4 sm:grid-cols-2">
                    <div>
                        <label for="fuel_type" class="form-label">Fuel Type <span class="text-rose-500">*</span></label>
                        <select id="fuel_type" name="fuel_type" required class="form-select">
                            {% for ft in fuel_types %}
                            <option value="{{ ft }}">{{ ft | replace('_', ' ') | title }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div>
                        <label for="odometer_reading" class="form-label">Odometer Reading (km) <span class="text-rose-500">*</span></label>
                        <input type="number" id="odometer_reading" name="odometer_reading" required
                               min="0" step="1"
                               class="form-input">
                    </div>
                </div>
            </div>
        </div>

        <!-- Fuel Quantity & Cost -->
        <div class="card">
            <div class="px-4 py-3 border-b border-slate-100 dark:border-slate-800">
                <h3 class="font-semibold text-slate-900 dark:text-white">Quantity & Cost</h3>
            </div>
            <div class="p-4 space-y-4">
                <div class="grid gap-4 sm:grid-cols-3">
                    <div>
                        <label for="quantity_liters" class="form-label">Quantity (Liters) <span class="text-rose-500">*</span></label>
                        <input type="number" id="quantity_liters" name="quantity_liters" required
                               min="0" step="0.01" placeholder="0.00"
                               class="form-input">
                    </div>
                    <div>
                        <label for="price_per_liter" class="form-label">Price per Liter <span class="text-rose-500">*</span></label>
                        <input type="number" id="price_per_liter" name="price_per_liter" required
                               min="0" step="0.01" placeholder="0.00"
                               class="form-input">
                    </div>
                    <div>
                        <label for="total_cost" class="form-label">Total Cost <span class="text-rose-500">*</span></label>
                        <input type="number" id="total_cost" name="total_cost" required
                               min="0" step="0.01" placeholder="0.00"
                               class="form-input">
                    </div>
                </div>

                <div class="grid gap-4 sm:grid-cols-2">
                    <div>
                        <label for="fuel_station" class="form-label">Fuel Station</label>
                        <input type="text" id="fuel_station" name="fuel_station"
                               placeholder="Station name"
                               class="form-input">
                    </div>
                    <div>
                        <label for="receipt_number" class="form-label">Receipt Number</label>
                        <input type="text" id="receipt_number" name="receipt_number"
                               placeholder="Receipt/invoice number"
                               class="form-input">
                    </div>
                </div>

                <div>
                    <label class="flex items-center gap-3 cursor-pointer">
                        <input type="checkbox" name="is_full_tank" value="true" class="form-checkbox">
                        <span class="text-sm text-slate-700 dark:text-slate-300">Full tank fill-up</span>
                    </label>
                </div>
            </div>
        </div>

        <!-- Notes -->
        <div class="card">
            <div class="px-4 py-3 border-b border-slate-100 dark:border-slate-800">
                <h3 class="font-semibold text-slate-900 dark:text-white">Notes</h3>
            </div>
            <div class="p-4">
                <textarea id="notes" name="notes" rows="3"
                          placeholder="Additional notes..."
                          class="form-textarea"></textarea>
            </div>
        </div>

        <!-- Actions -->
        <div class="flex items-center justify-end gap-3">
            <a href="/operations/fleet/fuel" class="btn btn-secondary">Cancel</a>
            <button type="submit" class="btn btn-primary">
                <svg class="h-4 w-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
                </svg>
                Record Fuel
            </button>
        </div>
    </form>
</div>
{% endblock %}
