{% extends "operations/base_operations.html" %}

{% block page_title %}Report Incident{% endblock %}

{% block breadcrumbs %}
<nav class="flex items-center gap-2 text-sm text-slate-500 dark:text-slate-400">
    <a href="/operations/dashboard" class="hover:text-amber-600 dark:hover:text-amber-400 transition-colors">Operations</a>
    <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
    </svg>
    <a href="/operations/fleet" class="hover:text-amber-600 dark:hover:text-amber-400 transition-colors">Fleet</a>
    <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
    </svg>
    <a href="/operations/fleet/incidents" class="hover:text-amber-600 dark:hover:text-amber-400 transition-colors">Incidents</a>
    <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
    </svg>
    <span class="font-medium text-slate-900 dark:text-white">Report</span>
</nav>
{% endblock %}

{% block content %}
<div class="max-w-4xl mx-auto">
    <form method="POST" action="/api/fleet/incidents" class="space-y-6">
        <!-- Vehicle & Classification -->
        <div class="card">
            <div class="px-4 py-3 border-b border-slate-100 dark:border-slate-800">
                <h3 class="font-semibold text-slate-900 dark:text-white">Incident Details</h3>
            </div>
            <div class="p-4 space-y-4">
                <div class="grid gap-4 sm:grid-cols-2">
                    <div>
                        <label for="vehicle_id" class="form-label">Vehicle <span class="text-rose-500">*</span></label>
                        <select id="vehicle_id" name="vehicle_id" required class="form-select">
                            <option value="">Select vehicle...</option>
                            {% for v in vehicles %}
                            <option value="{{ v.vehicle_id }}" {{ 'selected' if selected_vehicle_id and selected_vehicle_id|string == v.vehicle_id|string else '' }}>
                                {{ v.registration_number }} - {{ v.make }} {{ v.model }}
                            </option>
                            {% endfor %}
                        </select>
                    </div>
                    <div>
                        <label for="incident_date" class="form-label">Incident Date <span class="text-rose-500">*</span></label>
                        <input type="date" id="incident_date" name="incident_date" required class="form-input">
                    </div>
                </div>

                <div class="grid gap-4 sm:grid-cols-3">
                    <div>
                        <label for="incident_type" class="form-label">Incident Type <span class="text-rose-500">*</span></label>
                        <select id="incident_type" name="incident_type" required class="form-select">
                            <option value="">Select type...</option>
                            {% for it in incident_types %}
                            <option value="{{ it }}">{{ it | replace('_', ' ') | title }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div>
                        <label for="severity" class="form-label">Severity <span class="text-rose-500">*</span></label>
                        <select id="severity" name="severity" required class="form-select">
                            <option value="">Select severity...</option>
                            {% for sev in severities %}
                            <option value="{{ sev }}">{{ sev | replace('_', ' ') | title }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div>
                        <label for="incident_time" class="form-label">Time</label>
                        <input type="time" id="incident_time" name="incident_time" class="form-input">
                    </div>
                </div>

                <div>
                    <label for="location" class="form-label">Location</label>
                    <input type="text" id="location" name="location"
                           placeholder="Where the incident occurred"
                           class="form-input">
                </div>

                <div>
                    <label for="description" class="form-label">Description <span class="text-rose-500">*</span></label>
                    <textarea id="description" name="description" required rows="4"
                              placeholder="Describe what happened..."
                              class="form-textarea"></textarea>
                </div>
            </div>
        </div>

        <!-- Third Party & Police -->
        <div class="card">
            <div class="px-4 py-3 border-b border-slate-100 dark:border-slate-800">
                <h3 class="font-semibold text-slate-900 dark:text-white">Additional Information</h3>
            </div>
            <div class="p-4 space-y-4">
                <div>
                    <label class="flex items-center gap-3 cursor-pointer">
                        <input type="checkbox" name="third_party_involved" value="true" class="form-checkbox">
                        <span class="text-sm text-slate-700 dark:text-slate-300">Third party involved</span>
                    </label>
                </div>

                <div>
                    <label for="third_party_details" class="form-label">Third Party Details</label>
                    <textarea id="third_party_details" name="third_party_details" rows="2"
                              placeholder="Name, vehicle, contact details of third party..."
                              class="form-textarea"></textarea>
                </div>

                <div class="grid gap-4 sm:grid-cols-2">
                    <div>
                        <label for="police_report_number" class="form-label">Police Report Number</label>
                        <input type="text" id="police_report_number" name="police_report_number"
                               placeholder="If applicable"
                               class="form-input">
                    </div>
                    <div>
                        <label for="estimated_repair_cost" class="form-label">Estimated Repair Cost</label>
                        <input type="number" id="estimated_repair_cost" name="estimated_repair_cost"
                               min="0" step="0.01" placeholder="0.00"
                               class="form-input">
                    </div>
                </div>
            </div>
        </div>

        <!-- Notes -->
        <div class="card">
            <div class="px-4 py-3 border-b border-slate-100 dark:border-slate-800">
                <h3 class="font-semibold text-slate-900 dark:text-white">Notes</h3>
            </div>
            <div class="p-4">
                <textarea id="notes" name="notes" rows="3"
                          placeholder="Additional notes..."
                          class="form-textarea"></textarea>
            </div>
        </div>

        <!-- Actions -->
        <div class="flex items-center justify-end gap-3">
            <a href="/operations/fleet/incidents" class="btn btn-secondary">Cancel</a>
            <button type="submit" class="btn btn-primary">
                <svg class="h-4 w-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
                </svg>
                Report Incident
            </button>
        </div>
    </form>
</div>
{% endblock %}
