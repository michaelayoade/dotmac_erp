{% extends "operations/base_operations.html" %}

{% block title %}New Task{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto space-y-6">
    <div class="flex items-center gap-2">
        <a href="/operations/projects/tasks" class="text-slate-400 hover:text-slate-600 dark:hover:text-slate-300">
            <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
            </svg>
        </a>
        <h1 class="text-2xl font-display font-semibold text-slate-900 dark:text-white">New Task</h1>
    </div>

    <form method="post" class="rounded-lg border border-slate-200 bg-white p-6 dark:border-slate-700 dark:bg-slate-800 space-y-6">
        <input type="hidden" name="parent_task_id" value="">

        <div>
            <label for="project_id" class="block text-sm font-medium text-slate-700 dark:text-slate-300">Project</label>
            <select name="project_id" id="project_id" required
                    class="mt-1 block w-full rounded-lg border-slate-300 focus:border-amber-500 focus:ring-amber-500 dark:border-slate-600 dark:bg-slate-700 dark:text-white">
                <option value="">Select a project</option>
                {% for p in projects %}
                <option value="{{ p.project_id }}">{{ p.project_code }} - {{ p.project_name }}</option>
                {% endfor %}
            </select>
        </div>

        <div>
            <label for="task_name" class="block text-sm font-medium text-slate-700 dark:text-slate-300">Task Name</label>
            <input type="text" name="task_name" id="task_name" required
                   class="mt-1 block w-full rounded-lg border-slate-300 focus:border-amber-500 focus:ring-amber-500 dark:border-slate-600 dark:bg-slate-700 dark:text-white">
        </div>

        <div class="grid grid-cols-1 gap-6 sm:grid-cols-2">
            <div>
                <label for="task_code" class="block text-sm font-medium text-slate-700 dark:text-slate-300">Task Code</label>
                <input type="text" name="task_code" id="task_code"
                       placeholder="Auto-generated if blank"
                       class="mt-1 block w-full rounded-lg border-slate-300 focus:border-amber-500 focus:ring-amber-500 dark:border-slate-600 dark:bg-slate-700 dark:text-white">
            </div>
            <div>
                <label for="status" class="block text-sm font-medium text-slate-700 dark:text-slate-300">Status</label>
                <select name="status" id="status"
                        class="mt-1 block w-full rounded-lg border-slate-300 focus:border-amber-500 focus:ring-amber-500 dark:border-slate-600 dark:bg-slate-700 dark:text-white">
                    {% for s in statuses %}
                    <option value="{{ s }}" {{ 'selected' if s == 'OPEN' else '' }}>{{ s }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>

        <div>
            <label for="priority" class="block text-sm font-medium text-slate-700 dark:text-slate-300">Priority</label>
            <select name="priority" id="priority"
                    class="mt-1 block w-full rounded-lg border-slate-300 focus:border-amber-500 focus:ring-amber-500 dark:border-slate-600 dark:bg-slate-700 dark:text-white">
                {% for p in priorities %}
                <option value="{{ p }}" {{ 'selected' if p == 'MEDIUM' else '' }}>{{ p }}</option>
                {% endfor %}
            </select>
        </div>

        <div>
            <label for="description" class="block text-sm font-medium text-slate-700 dark:text-slate-300">Description</label>
            <textarea name="description" id="description" rows="4"
                      class="mt-1 block w-full rounded-lg border-slate-300 focus:border-amber-500 focus:ring-amber-500 dark:border-slate-600 dark:bg-slate-700 dark:text-white"></textarea>
        </div>

        <div class="grid grid-cols-1 gap-6 sm:grid-cols-2">
            <div>
                <label for="start_date" class="block text-sm font-medium text-slate-700 dark:text-slate-300">Start Date</label>
                <input type="date" name="start_date" id="start_date"
                       class="mt-1 block w-full rounded-lg border-slate-300 focus:border-amber-500 focus:ring-amber-500 dark:border-slate-600 dark:bg-slate-700 dark:text-white">
            </div>
            <div>
                <label for="due_date" class="block text-sm font-medium text-slate-700 dark:text-slate-300">Due Date</label>
                <input type="date" name="due_date" id="due_date"
                       class="mt-1 block w-full rounded-lg border-slate-300 focus:border-amber-500 focus:ring-amber-500 dark:border-slate-600 dark:bg-slate-700 dark:text-white">
            </div>
        </div>

        <div>
            <label for="estimated_hours" class="block text-sm font-medium text-slate-700 dark:text-slate-300">Estimated Hours</label>
            <input type="number" name="estimated_hours" id="estimated_hours" step="0.5" min="0"
                   class="mt-1 block w-full rounded-lg border-slate-300 focus:border-amber-500 focus:ring-amber-500 dark:border-slate-600 dark:bg-slate-700 dark:text-white">
        </div>

        <div class="grid grid-cols-1 gap-6 sm:grid-cols-2">
            <div>
                <label for="assigned_to_id" class="block text-sm font-medium text-slate-700 dark:text-slate-300">Assigned To</label>
                <select name="assigned_to_id" id="assigned_to_id"
                        class="mt-1 block w-full rounded-lg border-slate-300 focus:border-amber-500 focus:ring-amber-500 dark:border-slate-600 dark:bg-slate-700 dark:text-white">
                    <option value="">Unassigned</option>
                    {% for member in team_members %}
                    <option value="{{ member.employee_id }}">{{ member.full_name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div>
                <label for="ticket_id" class="block text-sm font-medium text-slate-700 dark:text-slate-300">Linked Support Ticket</label>
                <select name="ticket_id" id="ticket_id"
                        class="mt-1 block w-full rounded-lg border-slate-300 focus:border-amber-500 focus:ring-amber-500 dark:border-slate-600 dark:bg-slate-700 dark:text-white">
                    <option value="">No linked ticket</option>
                    {% for ticket in tickets or [] %}
                    <option value="{{ ticket.ticket_id }}">{{ ticket.ticket_number }} - {{ ticket.subject[:40] }}{% if ticket.subject|length > 40 %}...{% endif %}</option>
                    {% endfor %}
                </select>
            </div>
        </div>

        <div class="flex justify-end gap-3 pt-4 border-t border-slate-200 dark:border-slate-700">
            <a href="/operations/projects/tasks"
               class="rounded-lg border border-slate-300 bg-white px-4 py-2 text-sm font-medium text-slate-700 hover:bg-slate-50 dark:border-slate-600 dark:bg-slate-800 dark:text-slate-300 dark:hover:bg-slate-700 transition-colors">
                Cancel
            </a>
            <button type="submit"
                    class="rounded-lg bg-amber-600 px-4 py-2 text-sm font-medium text-white hover:bg-amber-700 transition-colors">
                Create Task
            </button>
        </div>
    </form>
</div>
{% endblock %}
