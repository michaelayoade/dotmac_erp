{% extends "base.html" %}

{% block title %}Conflict{% endblock %}

{% block content %}
<div class="min-h-[60vh] flex items-center justify-center px-4">
    <div class="max-w-md text-center">
        <div class="mb-6">
            <span class="text-8xl font-bold text-orange-200 dark:text-orange-900/50">409</span>
        </div>
        <h1 class="text-2xl font-semibold text-slate-900 dark:text-white mb-3">
            Conflict
        </h1>
        <p class="text-slate-600 dark:text-slate-400 mb-8">
            {{ message | default("The operation conflicts with the current state. The resource may have been modified by another user.", true) }}
        </p>
        <div class="flex flex-col sm:flex-row gap-3 justify-center">
            <a href="javascript:location.reload()" class="btn btn-secondary">
                <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
                </svg>
                Refresh
            </a>
            <a href="javascript:history.back()" class="btn btn-primary">
                Go Back
            </a>
        </div>
    </div>
</div>
{% endblock %}
